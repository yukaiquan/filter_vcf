name: Build & Release Binaries
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-unknown-linux-musl
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            arch: linux-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --force

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            target
          key: linux-cross-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}

      - name: Cross compile static binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          BIN=filter_vcf
          ARCH=${{ matrix.arch }}
          mkdir -p dist/${BIN}-${ARCH}
          cp target/${{ matrix.target }}/release/$BIN dist/${BIN}-${ARCH}/
          [ -f README.md ] && cp README.md dist/${BIN}-${ARCH}/
          [ -f LICENSE ] && cp LICENSE dist/${BIN}-${ARCH}/
          cd dist && tar zcvf ${BIN}-${ARCH}.tar.gz ${BIN}-${ARCH}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 90

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
        include:
          - target: x86_64-pc-windows-msvc
            arch: windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            target
          key: win-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
      - name: Build exe
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package zip
        run: |
          $BIN = "filter_vcf"
          $ARCH = "${{ matrix.arch }}"
          $OUT = "dist/$BIN-$ARCH"
          New-Item -Force -ItemType Directory $OUT
          Copy-Item "target/${{ matrix.target }}/release/$BIN.exe" $OUT
          if(Test-Path README.md){Copy-Item README.md $OUT}
          if(Test-Path LICENSE){Copy-Item LICENSE $OUT}
          cd dist
          Compress-Archive "$BIN-$ARCH" "$BIN-$ARCH.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}
          path: dist/*.zip
          retention-days: 90

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        include:
          - target: x86_64-apple-darwin
            arch: macos-x86_64
          - target: aarch64-apple-darwin
            arch: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            target
          key: mac-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package tarball
        shell: bash
        run: |
          BIN=filter_vcf
          ARCH=${{ matrix.arch }}
          mkdir -p dist/${BIN}-${ARCH}
          cp target/${{ matrix.target }}/release/$BIN dist/${BIN}-${ARCH}/
          [ -f README.md ] && cp README.md dist/${BIN}-${ARCH}/
          [ -f LICENSE ] && cp LICENSE dist/${BIN}-${ARCH}/
          cd dist && tar zcvf ${BIN}-${ARCH}.tar.gz ${BIN}-${ARCH}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 90

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
