name: Build Rust Multi-Platform Binaries
on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-unknown-linux-musl
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            arch: linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl
        run: sudo apt update && sudo apt install musl-tools
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry target
          key: linux-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BIN=filter_vcf
          ARCH=${{ matrix.arch }}
          DIST=dist/${BIN}-${ARCH}
          mkdir -p $DIST
          cp target/${{ matrix.target }}/release/$BIN $DIST/
          [ -f README.md ] && cp README.md $DIST/
          [ -f LICENSE ] && cp LICENSE $DIST/
          cd dist && tar zcvf ${BIN}-${ARCH}.tar.gz ${BIN}-${ARCH}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
        include:
          - target: x86_64-pc-windows-msvc
            arch: windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry target
          key: win-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          $BIN = "filter_vcf"
          $ARCH = "${{ matrix.arch }}"
          $OUT = "dist/$BIN-$ARCH"
          New-Item -ItemType Directory -Force $OUT
          Copy-Item "target/${{ matrix.target }}/release/$BIN.exe" $OUT
          if(Test-Path README.md){Copy-Item README.md $OUT}
          if(Test-Path LICENSE){Copy-Item LICENSE $OUT}
          cd dist
          Compress-Archive -Path "$BIN-$ARCH" -DestinationPath "$BIN-$ARCH.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        include:
          - target: x86_64-apple-darwin
            arch: macos-x86_64
          - target: aarch64-apple-darwin
            arch: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry target
          key: mac-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BIN=filter_vcf
          ARCH=${{ matrix.arch }}
          DIST=dist/${BIN}-${ARCH}
          mkdir -p $DIST
          cp target/${{ matrix.target }}/release/$BIN $DIST/
          [ -f README.md ] && cp README.md $DIST/
          [ -f LICENSE ] && cp LICENSE $DIST/
          cd dist && tar zcvf ${BIN}-${ARCH}.tar.gz ${BIN}-${ARCH}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.tar.gz artifacts/*/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
